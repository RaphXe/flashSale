services:
  db:
    image: mysql:8.0
    container_name: flashsale-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_database}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  fluent-bit:
    image: fluent/fluent-bit:2.2
    container_name: flashsale-fluent-bit
    restart: unless-stopped
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - flashsale-network

  user-service:
    build:
      context: .
      dockerfile: user/Dockerfile
    container_name: flashsale-user
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - flashsale-network

  goods-service:
    build:
      context: .
      dockerfile: goods/Dockerfile
    container_name: flashsale-goods
    restart: unless-stopped
    labels:
      service: goods-service
      project: flashsale
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      GOODS_CACHE_TTL_SECONDS: ${GOODS_CACHE_TTL_SECONDS:-300}
      GOODS_BLOOM_EXPECTED_INSERTIONS: ${GOODS_BLOOM_EXPECTED_INSERTIONS:-100000}
      GOODS_BLOOM_FPP: ${GOODS_BLOOM_FPP:-0.01}
    logging:
      driver: fluentd
      options:
        fluentd-address: ${FLUENTD_ADDRESS:-127.0.0.1:24224}
        tag: docker.goods-service
        fluentd-async: "true"
        labels: "service,project"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:8082/api/goods" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flashsale-network

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    container_name: flashsale-stock
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - flashsale-network

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: flashsale-order
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      GOODS_SERVICE_BASE_URL: ${GOODS_SERVICE_BASE_URL:-http://goods-service:8082}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
    networks:
      - flashsale-network

  seckill-service:
    build:
      context: .
      dockerfile: seckill/Dockerfile
    container_name: flashsale-seckill
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      stock-service:
        condition: service_started
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
    networks:
      - flashsale-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-api/Dockerfile
    container_name: flashsale-gateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      goods-service:
        condition: service_healthy
      stock-service:
        condition: service_started
      order-service:
        condition: service_started
      seckill-service:
        condition: service_started
    environment:
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service:8081}
      GOODS_SERVICE_BASE_URL: ${GOODS_SERVICE_BASE_URL:-http://goods-service:8082}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
      ORDER_SERVICE_BASE_URL: ${ORDER_SERVICE_BASE_URL:-http://order-service:8084}
      SECKILL_SERVICE_BASE_URL: ${SECKILL_SERVICE_BASE_URL:-http://seckill-service:8085}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JAVA_TOOL_OPTIONS: ${GATEWAY_JAVA_TOOL_OPTIONS:--Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    expose:
      - "8080"
    networks:
      - flashsale-network

  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: flashsale-nginx
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - flashsale-network

networks:
  flashsale-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
