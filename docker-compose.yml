services:
  db:
    image: mysql:8.0
    container_name: flashsale-db
    restart: unless-stopped
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_database}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-repl}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:-repl_123456}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./mysql/master-init/01-create-replication-user.sh:/docker-entrypoint-initdb.d/01-create-replication-user.sh:ro
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 10s
      retries: 10

  db-replica:
    image: mysql:8.0
    container_name: flashsale-db-replica
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command:
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --read-only=ON
      - --super-read-only=ON
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-repl}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:-repl_123456}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - db_replica_data:/var/lib/mysql
      - ./mysql/replica-init/01-configure-replica.sh:/docker-entrypoint-initdb.d/01-configure-replica.sh:ro
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  proxysql:
    image: proxysql/proxysql:2.7.2
    container_name: flashsale-proxysql
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    ports:
      - "6033:6033"
      - "6032:6032"
    networks:
      - flashsale-network

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - redis_data:/data
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.1
    container_name: flashsale-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "9092:9092"
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: flashsale-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 10

  fluent-bit:
    image: fluent/fluent-bit:2.2
    container_name: flashsale-fluent-bit
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    networks:
      - flashsale-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: flashsale-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - flashsale-network
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:9200/_cluster/health" ]
      interval: 10s
      timeout: 10s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: user/Dockerfile
    container_name: flashsale-user
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://proxysql:6033/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - flashsale-network

  goods-service:
    build:
      context: .
      dockerfile: goods/Dockerfile
    container_name: flashsale-goods
    restart: unless-stopped
    labels:
      service: goods-service
      project: flashsale
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://proxysql:6033/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      GOODS_SEARCH_ES_BOOTSTRAP_ENABLED: ${GOODS_SEARCH_ES_BOOTSTRAP_ENABLED:-true}
      GOODS_CACHE_TTL_SECONDS: ${GOODS_CACHE_TTL_SECONDS:-300}
      GOODS_BLOOM_EXPECTED_INSERTIONS: ${GOODS_BLOOM_EXPECTED_INSERTIONS:-100000}
      GOODS_BLOOM_FPP: ${GOODS_BLOOM_FPP:-0.01}
      GOODS_CACHE_WARMUP_ENABLED: ${GOODS_CACHE_WARMUP_ENABLED:-true}
      GOODS_WARMUP_ES_INDEX_PATTERN: ${GOODS_WARMUP_ES_INDEX_PATTERN:-goods-service-*}
      GOODS_WARMUP_MAX_COUNT: ${GOODS_WARMUP_MAX_COUNT:-1000}
      GOODS_WARMUP_RATIO: ${GOODS_WARMUP_RATIO:-0.2}
      TZ: ${TZ:-Asia/Shanghai}
    logging:
      driver: fluentd
      options:
        fluentd-address: ${FLUENTD_ADDRESS:-127.0.0.1:24224}
        tag: docker.goods-service
        fluentd-async: "true"
        labels: "service,project"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:8082/api/goods" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flashsale-network

  stock-service:
    build:
      context: .
      dockerfile: stock/Dockerfile
    container_name: flashsale-stock
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://proxysql:6033/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - flashsale-network

  order-service:
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: flashsale-order
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://proxysql:6033/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      GOODS_SERVICE_BASE_URL: ${GOODS_SERVICE_BASE_URL:-http://goods-service:8082}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - flashsale-network

  seckill-service:
    build:
      context: .
      dockerfile: seckill/Dockerfile
    container_name: flashsale-seckill
    restart: unless-stopped
    depends_on:
      proxysql:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      stock-service:
        condition: service_started
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://proxysql:6033/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: ${SECKILL_JAVA_TOOL_OPTIONS:--Duser.timezone=Asia/Shanghai}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
    networks:
      - flashsale-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-api/Dockerfile
    container_name: flashsale-gateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      goods-service:
        condition: service_healthy
      stock-service:
        condition: service_started
      order-service:
        condition: service_started
      seckill-service:
        condition: service_started
    environment:
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service:8081}
      GOODS_SERVICE_BASE_URL: ${GOODS_SERVICE_BASE_URL:-http://goods-service:8082}
      STOCK_SERVICE_BASE_URL: ${STOCK_SERVICE_BASE_URL:-http://stock-service:8083}
      ORDER_SERVICE_BASE_URL: ${ORDER_SERVICE_BASE_URL:-http://order-service:8084}
      SECKILL_SERVICE_BASE_URL: ${SECKILL_SERVICE_BASE_URL:-http://seckill-service:8085}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JAVA_TOOL_OPTIONS: ${GATEWAY_JAVA_TOOL_OPTIONS:--Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    expose:
      - "8080"
    networks:
      - flashsale-network

  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: flashsale-nginx
    restart: unless-stopped
    depends_on:
      gateway-service:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "80:80"
    networks:
      - flashsale-network

networks:
  flashsale-network:
    driver: bridge

volumes:
  db_data:
  db_replica_data:
  redis_data:
  elasticsearch_data:
