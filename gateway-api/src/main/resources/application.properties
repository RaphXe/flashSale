spring.application.name=gateway-service
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}
server.port=8080

services.user.base-url=${USER_SERVICE_BASE_URL:http://localhost:8081}
services.goods.base-url=${GOODS_SERVICE_BASE_URL:http://localhost:8082}
services.stock.base-url=${STOCK_SERVICE_BASE_URL:http://localhost:8083}
services.order.base-url=${ORDER_SERVICE_BASE_URL:http://localhost:8084}
services.seckill.base-url=${SECKILL_SERVICE_BASE_URL:http://localhost:8085}

# JWT settings used by gateway to issue and validate tokens
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=${services.user.base-url}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/user/**

spring.cloud.gateway.server.webflux.routes[1].id=goods-service
spring.cloud.gateway.server.webflux.routes[1].uri=${services.goods.base-url}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/goods/**

spring.cloud.gateway.server.webflux.routes[2].id=stock-service
spring.cloud.gateway.server.webflux.routes[2].uri=${services.stock.base-url}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/stock/**

spring.cloud.gateway.server.webflux.routes[3].id=order-service
spring.cloud.gateway.server.webflux.routes[3].uri=${services.order.base-url}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/order/**

spring.cloud.gateway.server.webflux.routes[4].id=seckill-service
spring.cloud.gateway.server.webflux.routes[4].uri=${services.seckill.base-url}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/seckill/**

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true

# Explicitly allow common local frontend origins to avoid browser preflight issues.
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,http://localhost:80,http://127.0.0.1:80
