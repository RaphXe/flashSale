spring.application.name=goods-service
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}
server.port=8082
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.lettuce.pool.enabled=true
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.elasticsearch.uris=${ELASTICSEARCH_URL:http://localhost:9200}
goods.search.es.bootstrap-enabled=${GOODS_SEARCH_ES_BOOTSTRAP_ENABLED:true}
goods.cache.detail-ttl-seconds=${GOODS_CACHE_TTL_SECONDS:300}
goods.cache.search-ttl-seconds=${GOODS_SEARCH_CACHE_TTL_SECONDS:300}
goods.cache.bloom.expected-insertions=${GOODS_BLOOM_EXPECTED_INSERTIONS:100000}
goods.cache.bloom.false-positive-probability=${GOODS_BLOOM_FPP:0.01}
goods.cache.warmup.enabled=${GOODS_CACHE_WARMUP_ENABLED:true}
goods.cache.warmup.es-index-pattern=${GOODS_WARMUP_ES_INDEX_PATTERN:goods-service-*}
goods.cache.warmup.max-count=${GOODS_WARMUP_MAX_COUNT:1000}
goods.cache.warmup.ratio=${GOODS_WARMUP_RATIO:0.2}
