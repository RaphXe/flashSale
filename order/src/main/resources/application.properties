spring.application.name=order-service
server.port=8084
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.lettuce.pool.enabled=true
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=${ORDER_KAFKA_GROUP:order-consumer-group}
spring.kafka.consumer.properties.spring.json.trusted.packages=com.raph.order.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.raph.order.dto.CreateOrderMessage
spring.kafka.listener.ack-mode=record
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
services.goods.base-url=${GOODS_SERVICE_BASE_URL:http://localhost:8082}
services.stock.base-url=${STOCK_SERVICE_BASE_URL:http://localhost:8083}
snowflake.worker-id=${SNOWFLAKE_WORKER_ID:1}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID:1}
order.kafka.topic=${ORDER_KAFKA_TOPIC:order-create}
order.kafka.partitions=${ORDER_KAFKA_PARTITIONS:6}
order.kafka.replicas=${ORDER_KAFKA_REPLICAS:1}
order.consume.idempotent.lock-ttl-seconds=${ORDER_CONSUME_IDEMPOTENT_LOCK_TTL_SECONDS:600}
order.consume.idempotent.done-ttl-seconds=${ORDER_CONSUME_IDEMPOTENT_DONE_TTL_SECONDS:604800}
order.timeout.delay-ms=${ORDER_TIMEOUT_DELAY_MS:1800000}
order.timeout.queue=${ORDER_TIMEOUT_QUEUE:order.timeout.queue}
order.timeout.message.sent-ttl-seconds=${ORDER_TIMEOUT_MESSAGE_SENT_TTL_SECONDS:172800}
order.timeout.consume.idempotent.lock-ttl-seconds=${ORDER_TIMEOUT_CONSUME_IDEMPOTENT_LOCK_TTL_SECONDS:600}
order.timeout.consume.idempotent.done-ttl-seconds=${ORDER_TIMEOUT_CONSUME_IDEMPOTENT_DONE_TTL_SECONDS:604800}