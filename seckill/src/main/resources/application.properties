spring.application.name=seckill-service
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}
server.port=8085
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=${SECKILL_ORDER_KAFKA_GROUP:seckill-order-consumer-group}
spring.kafka.consumer.properties.spring.json.trusted.packages=com.raph.seckill.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.raph.seckill.dto.CreateSeckillOrderMessage
spring.kafka.listener.ack-mode=record
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stock_database?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
services.stock.base-url=${STOCK_SERVICE_BASE_URL:http://localhost:8083}
snowflake.worker-id=${SNOWFLAKE_WORKER_ID:1}
snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID:1}
seckill.goods.cache.detail-ttl-seconds=${SECKILL_GOODS_CACHE_DETAIL_TTL_SECONDS:300}
seckill.goods.cache.bloom.expected-insertions=${SECKILL_GOODS_BLOOM_EXPECTED_INSERTIONS:100000}
seckill.goods.cache.bloom.false-positive-probability=${SECKILL_GOODS_BLOOM_FPP:0.01}
seckill.order.kafka.topic=${SECKILL_ORDER_KAFKA_TOPIC:seckill-order-create}
seckill.order.kafka.partitions=${SECKILL_ORDER_KAFKA_PARTITIONS:6}
seckill.order.kafka.replicas=${SECKILL_ORDER_KAFKA_REPLICAS:1}
seckill.order.consume.idempotent.lock-ttl-seconds=${SECKILL_ORDER_CONSUME_IDEMPOTENT_LOCK_TTL_SECONDS:600}
seckill.order.consume.idempotent.done-ttl-seconds=${SECKILL_ORDER_CONSUME_IDEMPOTENT_DONE_TTL_SECONDS:604800}
seckill.order.timeout.delay-ms=${SECKILL_ORDER_TIMEOUT_DELAY_MS:900000}
seckill.order.timeout.queue=${SECKILL_ORDER_TIMEOUT_QUEUE:seckill.order.timeout.queue}
seckill.order.timeout.consume.idempotent.lock-ttl-seconds=${SECKILL_ORDER_TIMEOUT_CONSUME_IDEMPOTENT_LOCK_TTL_SECONDS:600}
seckill.order.timeout.consume.idempotent.done-ttl-seconds=${SECKILL_ORDER_TIMEOUT_CONSUME_IDEMPOTENT_DONE_TTL_SECONDS:604800}
seckill.local-message.publisher.fixed-delay-ms=${SECKILL_LOCAL_MESSAGE_PUBLISHER_FIXED_DELAY_MS:3000}
seckill.activity.scheduler.poll-cron=${SECKILL_ACTIVITY_SCHEDULER_POLL_CRON:0 * * * * ?}
seckill.activity.scheduler.poll-ahead-minutes=${SECKILL_ACTIVITY_SCHEDULER_POLL_AHEAD_MINUTES:60}
seckill.activity.scheduler.warmup-ahead-minutes=${SECKILL_ACTIVITY_SCHEDULER_WARMUP_AHEAD_MINUTES:5}
seckill.activity.scheduler.settle-delay-minutes=${SECKILL_ACTIVITY_SCHEDULER_SETTLE_DELAY_MINUTES:20}
seckill.activity.scheduler.plan.idempotent-ttl-seconds=${SECKILL_ACTIVITY_SCHEDULER_PLAN_IDEMPOTENT_TTL_SECONDS:259200}
seckill.activity.scheduler.consume.lock-ttl-seconds=${SECKILL_ACTIVITY_SCHEDULER_CONSUME_LOCK_TTL_SECONDS:600}
seckill.activity.scheduler.consume.done-ttl-seconds=${SECKILL_ACTIVITY_SCHEDULER_CONSUME_DONE_TTL_SECONDS:604800}
seckill.activity.scheduler.cache-ttl-seconds=${SECKILL_ACTIVITY_SCHEDULER_CACHE_TTL_SECONDS:7200}
seckill.activity.task.trigger.queue=${SECKILL_ACTIVITY_TASK_TRIGGER_QUEUE:seckill.activity.task.trigger.queue}
management.server.port=${MANAGEMENT_SERVER_PORT:18085}
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=100ms,300ms,500ms,1s,3s
